<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>德州扑克</title>
  <link rel="stylesheet" href="styles/ios-style.css">
</head>
<body>
  <div id="app">
    <!-- 登录页面 -->
  <div id="page-login" class="page hidden">
    <div class="login-container">
      <div class="logo-area">
        <span class="poker-icon">🃏</span>
        <h1 class="title">德州扑克</h1>
        <p class="subtitle">随时随地，享受德州扑克的乐趣</p>
      </div>
      
      <div class="loading-tip">
        <div class="loading-spinner"></div>
        <span>正在为您分配账号...</span>
      </div>
      
      <div class="features">
        <div class="feature-item">
          <span class="feature-icon">🎮</span>
          <span class="feature-text">好友对战</span>
        </div>
        <div class="feature-item">
          <span class="feature-icon">🏆</span>
          <span class="feature-text">竞技排行</span>
        </div>
        <div class="feature-item">
          <span class="feature-icon">⚡</span>
          <span class="feature-text">实时对战</span>
        </div>
      </div>
    </div>
  </div>

    <!-- 大厅页面 -->
    <div id="page-index" class="page hidden">
      <div class="nav-header">
        <button class="nav-button" id="btn-profile">个人中心</button>
        <h1 class="nav-title">德州扑克</h1>
        <button class="nav-button" id="btn-refresh">刷新</button>
      </div>
      
      <div class="user-card">
        <div id="user-avatar" class="avatar"></div>
        <div class="user-info-text">
          <div id="user-nickname" class="user-name">游客</div>
          <div class="user-status">在线</div>
        </div>
      </div>
      
      <div class="tab-bar">
        <div class="tab-item active" data-tab="rooms" id="tab-rooms">房间列表</div>
        <div class="tab-item" data-tab="create" id="tab-create">创建房间</div>
      </div>
      
      <!-- 牌桌列表 -->
      <div id="room-list" class="room-list">
        <div class="empty-tip" id="empty-tip" style="display: none;">
          <span>暂无房间，创建一个新房间吧！</span>
        </div>
      </div>
      
      <!-- 创建房间 -->
      <div id="create-room" class="form-section hidden">
        <div class="form-group">
          <label class="form-label">房间名称</label>
          <input type="text" id="input-room-name" class="form-input" placeholder="输入房间名称">
        </div>
        
        <div class="form-group">
          <label class="form-label">房间密码（可选）</label>
          <input type="password" id="input-password" class="form-input" placeholder="留空表示公开房间">
        </div>
        
        <button class="btn-primary" id="btn-create-room">创建房间</button>
      </div>
      
      <!-- 加入房间弹窗 -->
      <div class="modal" id="join-modal" style="display: none;">
        <div class="modal-content" id="modal-content">
          <h3 class="modal-title">加入房间</h3>
          <input type="text" id="input-join-room-id" class="input-field" placeholder="请输入房间号">
          <input type="password" id="input-join-password" class="input-field" placeholder="请输入密码（如有）">
          <button class="btn-join" id="btn-confirm-join">加入</button>
        </div>
      </div>
    </div>

    <!-- 房间页面 -->
    <div id="page-room" class="page hidden">
      <div class="room-header">
        <button class="btn-back" id="btn-leave-room">← 离开</button>
        <h2 class="room-title" id="room-name">房间</h2>
        <div></div>
      </div>
      
      <div class="players-list" id="players-list">
        <!-- 玩家列表 -->
      </div>
      
      <div class="room-actions">
        <button class="btn-start-game" id="btn-start-game">开始游戏</button>
      </div>
      
      <div class="invite-tip">
        <span>分享邀请好友：</span>
        <span id="invite-code">-</span>
      </div>
    </div>

    <!-- 游戏页面 -->
    <div id="page-game" class="page hidden">
      <div class="game-table">
        <div class="game-header">
          <button class="nav-button" id="btn-exit-game">← 返回</button>
          <h1 class="nav-title">游戏进行中</h1>
          <button class="nav-button" onclick="showGameMenu()">菜单</button>
        </div>
        
        <div class="pot-info">
          底池: <span id="pot-amount">0</span>
        </div>
        
        <div class="community-cards" id="community-cards">
          <!-- 公共牌 -->
        </div>
        
        <div class="players-area" id="players-area">
          <!-- 玩家区域 -->
        </div>
        
        <div class="action-panel">
          <div class="my-cards" id="my-cards">
            <!-- 我的手牌 -->
          </div>
          
          <div class="action-buttons" id="action-buttons" style="display: none;">
            <button class="btn-game btn-fold" id="btn-fold">弃牌</button>
            <button class="btn-game btn-check" id="btn-check">过牌</button>
            <button class="btn-game btn-call" id="btn-call">跟注 <span id="call-amount">0</span></button>
            <button class="btn-game btn-raise" id="btn-raise">加注</button>
          </div>
          
          <div class="slider-container" id="bet-slider-container" style="display: none;">
            <div class="bet-amount" id="bet-amount">0</div>
            <input type="range" class="bet-slider" id="bet-slider" min="0" max="1000" value="0">
          </div>
        </div>
      </div>
      
      <!-- 摊牌弹窗 -->
      <div class="modal" id="showdown-modal" style="display: none;">
        <div class="modal-content">
          <h3 class="modal-title">游戏结果</h3>
          <div id="showdown-content"></div>
          <button class="btn-confirm" id="btn-close-showdown">确定</button>
        </div>
      </div>
    </div>

    <!-- 个人中心页面 -->
    <div id="page-profile" class="page hidden">
      <div class="profile-header">
        <img class="avatar-large" id="profile-avatar" src="" alt="头像">
        <h2 class="nickname-large" id="profile-nickname">游客</h2>
      </div>
      
      <div class="profile-stats">
        <div class="stat-item">
          <span class="stat-value" id="stat-games">0</span>
          <span class="stat-label">游戏局数</span>
        </div>
        <div class="stat-item">
          <span class="stat-value" id="stat-wins">0</span>
          <span class="stat-label">获胜次数</span>
        </div>
        <div class="stat-item">
          <span class="stat-value" id="stat-chips">1000</span>
          <span class="stat-label">游戏币</span>
        </div>
      </div>
      
      <div class="profile-menu">
        <div class="menu-item" id="btn-logout">
          <span>退出登录</span>
          <span class="arrow">→</span>
        </div>
      </div>
    </div>
    
    <!-- 版本号 -->
    <div class="version-footer">
      <span class="version-text">v1.0.0</span>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <script src="scripts/app.js"></script>
</body>
</html>
